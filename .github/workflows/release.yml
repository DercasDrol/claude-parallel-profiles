name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            publish:
                description: "Publish to VS Code Marketplace"
                required: true
                default: true
                type: boolean
            create_release:
                description: "Create GitHub Release"
                required: true
                default: true
                type: boolean

jobs:
    release:
        name: Build and Release
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Compile TypeScript
              run: npm run compile

            - name: Get version from package.json
              id: package_version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "tag=v$VERSION" >> $GITHUB_OUTPUT

            # ONE universal package — deliberately not platform-specific.
            #
            # Publishing Linux-only targets looked like a neat way to hide the
            # extension where it cannot work. It isn't: in WSL and Remote-SSH the
            # extension runs on the Linux REMOTE, but the VSCode CLIENT is Windows
            # or macOS ("clientTargetPlatform":"win32-x64" in its own install log)
            # — and the client is what resolves the Marketplace. With no win32
            # package and no universal one, it finds no compatible version, decides
            # the extension is gone ("This extension is no longer available on the
            # Extension Marketplace") and never offers an update. That hit exactly
            # the users this extension is FOR.
            #
            # There is no native code here, so a platform-specific build buys
            # nothing anyway. The Linux requirement is enforced where it belongs —
            # at runtime, by the inert mode in extension.ts.
            - name: Package extension (universal)
              run: npx @vscode/vsce package

            - name: Create GitHub Release (on tag push)
              uses: softprops/action-gh-release@v2
              if: startsWith(github.ref, 'refs/tags/')
              with:
                  files: "*.vsix"
                  name: "Claude Parallel Accounts ${{ github.ref_name }}"
                  generate_release_notes: true
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create GitHub Release (manual trigger)
              uses: softprops/action-gh-release@v2
              if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
              with:
                  files: "*.vsix"
                  tag_name: ${{ steps.package_version.outputs.tag }}
                  name: "Claude Parallel Accounts ${{ steps.package_version.outputs.tag }}"
                  generate_release_notes: true
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # One universal .vsix, published by path to both registries.
            - name: Publish to VS Code Marketplace
              if: |
                  (startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish == 'true') &&
                  env.VSCE_PAT != ''
              run: |
                  for f in *.vsix; do
                    npx @vscode/vsce publish --packagePath "$f"
                  done
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Publish to Open VSX Registry
              if: |
                  (startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish == 'true') &&
                  env.OVSX_PAT != ''
              run: |
                  for f in *.vsix; do
                    npx ovsx publish "$f" -p "$OVSX_PAT"
                  done
              env:
                  OVSX_PAT: ${{ secrets.OVSX_PAT }}
