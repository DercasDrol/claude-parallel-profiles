<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc785c"/>
      <stop offset="100%" style="stop-color:#e8956d"/>
    </linearGradient>
    <linearGradient id="profile1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#2d7dd2"/>
    </linearGradient>
    <linearGradient id="profile2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#56c596"/>
      <stop offset="100%" style="stop-color:#3aa876"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="64" cy="64" r="60"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="url(#bg)"/>

  <!-- Left profile card -->
  <rect x="10" y="38" width="46" height="54" rx="8" fill="#0f3460" opacity="0.9"/>
  <!-- Left avatar circle -->
  <circle cx="33" cy="58" r="11" fill="url(#profile1)"/>
  <!-- Left avatar person -->
  <circle cx="33" cy="55" r="5" fill="#1a3a6e"/>
  <ellipse cx="33" cy="67" rx="8" ry="5" fill="#1a3a6e"/>
  <!-- Left name lines -->
  <rect x="18" y="74" width="30" height="3" rx="1.5" fill="#4a9eff" opacity="0.7"/>
  <rect x="22" y="80" width="22" height="2.5" rx="1.25" fill="#4a9eff" opacity="0.4"/>

  <!-- Right profile card -->
  <rect x="72" y="38" width="46" height="54" rx="8" fill="#0a3d2e" opacity="0.9"/>
  <!-- Right avatar circle -->
  <circle cx="95" cy="58" r="11" fill="url(#profile2)"/>
  <!-- Right avatar person -->
  <circle cx="95" cy="55" r="5" fill="#0d3325"/>
  <ellipse cx="95" cy="67" rx="8" ry="5" fill="#0d3325"/>
  <!-- Right name lines -->
  <rect x="80" y="74" width="30" height="3" rx="1.5" fill="#56c596" opacity="0.7"/>
  <rect x="84" y="80" width="22" height="2.5" rx="1.25" fill="#56c596" opacity="0.4"/>

  <!-- Swap arrows in the middle -->
  <!-- Top arrow: left → right -->
  <path d="M50 56 L78 56" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="78,52 85,56 78,60" fill="url(#accent)"/>
  <!-- Bottom arrow: right → left -->
  <path d="M78 70 L50 70" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="50,66 43,70 50,74" fill="url(#accent)"/>

  <!-- Subtle outer ring -->
  <circle cx="64" cy="64" r="62" fill="none" stroke="#cc785c" stroke-width="1" opacity="0.3"/>
</svg>
